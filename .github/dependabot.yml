# 🔄 Automated Dependency Updates
# Managed by Dependabot

version: 2
updates:
  # 🐳 Dockerfile updates (base images like eclipse-temurin)
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "daily"
    target-branch: "main"
    labels:
      - "docker"
      - "dependencies"

  # 📝 Ruby (Jekyll docs) updates
  - package-ecosystem: "bundler"
    directory: "/docs/dev/"
    schedule:
      interval: "weekly"
    target-branch: "main"
    labels:
      - "dependencies"

  # ⚙️ GitHub Actions updates
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    target-branch: "main"
    labels:
      - "github-actions"
      - "dependencies"
